name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fleuve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fleuve_test
      TEST_NATS_URL: nats://localhost:4222
      TEST_STORAGE_KEY: test-storage-key-32-characters-long!

    steps:
      - uses: actions/checkout@v4

      # Service containers do not support Docker Compose-style `args`; JetStream needs `-js`.
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:latest -js
          sleep 3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root --with dev

      - name: Install project with otel and dev
        run: poetry install --no-interaction -E otel --with dev

      - name: Build UI (for package)
        run: poetry run python scripts/build_ui.py

      - name: Run tests with coverage
        run: poetry run pytest fleuve/tests -v --cov=fleuve --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check formatting (Black)
        run: poetry run black --check fleuve

      - name: Type check (mypy)
        run: poetry run mypy fleuve
